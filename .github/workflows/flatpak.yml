name: Flatpak

on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'engine/**'
      - '.github/workflows/flatpak.yml'

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Generate offline cargo sources
        run: |
          pip3 install --break-system-packages aiohttp toml || pip3 install aiohttp toml
          curl -fsSLo /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py engine/Cargo.lock \
            -o engine/build-aux/cargo-sources.json

      - name: Build bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.7
        with:
          bundle: dualcut.flatpak
          manifest-path: engine/build-aux/io.github.hanthor.Dualcut.json
          cache-key: flatpak-builder-${{ hashFiles('engine/Cargo.lock', 'engine/build-aux/*.json') }}

      - name: Attach bundle to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dualcut.flatpak
          generate_release_notes: true

  user-guide:
    name: Regenerate user-guide screenshots
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    container:
      image: quay.io/fedora/fedora:44
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install build + runtime dependencies
        run: |
          dnf install -y -q git cargo rust clang-devel pkgconf-pkg-config \
            gtk4-devel libadwaita-devel gstreamer1-devel \
            gstreamer1-plugins-base-devel gst-editing-services-devel \
            gstreamer1-plugins-good gstreamer1-plugins-bad-free \
            gstreamer1-plugin-libav gstreamer1-plugins-ugly-free \
            mesa-vulkan-drivers xorg-x11-server-Xvfb xwd xset \
            python3-pillow xz
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build preview binary
        working-directory: engine
        run: cargo build --features preview,scripting,vector

      - name: Run walkthrough
        run: scripts/walkthrough.sh engine/target/debug/preview

      - name: Commit refreshed screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/guide
          git pull --rebase --autostash origin main
          if git diff --cached --quiet; then
            echo "guide unchanged"
          else
            git commit -m "docs: refresh user-guide screenshots for ${GITHUB_REF_NAME}"
            git push origin main
          fi
